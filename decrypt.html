<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norton Decrypt Tool</title>

<script src="crypto-js.min.js"></script>

<style>
* { box-sizing: border-box; }

:root {
  --norton-black-1100: #010203;
  --norton-black-1000: #2A2D32;
  --norton-black-800:  #6A6D72;
  --norton-black-400:  #E0E1E2;
  --norton-black-200:  #EFF0F1;
  --norton-white:      #FFFFFF;
  --success-500:#41B631;
  --error-400:#D22316;
  --accent-gold:#FEDB00;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui;
  background: linear-gradient(135deg, var(--norton-black-200), #f7f7f8);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
}

.page-wrapper {
  width: 100%;
  max-width: 420px;
  padding: 24px 16px;
}

.logo-wrapper {
  text-align: center;
  margin-bottom: 16px;
}

.company-logo {
  max-width: 220px;
}

.card {
  background: var(--norton-white);
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 15px 40px rgba(15,23,42,.12);
}

h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
  color: var(--norton-black-1100);
}

.section-underline {
  width: 40px;
  height: 3px;
  background: var(--accent-gold);
  margin: 6px 0 18px;
  border-radius: 2px;
}

input {
  width: 100%;
  padding: 12px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid var(--norton-black-400);
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: var(--norton-black-1100);
  box-shadow: 0 0 0 2px rgba(1,2,3,0.1);
}

.btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(
    180deg,
    var(--norton-black-1000),
    var(--norton-black-1100)
  );
  color: white;
  border: none;
  border-radius: 0;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

.btn:hover {
  opacity: 0.92;
}

/* Popup */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(1,2,3,0.6);
  align-items: center;
  justify-content: center;
}

.popup-card {
  background: white;
  padding: 24px;
  border-radius: 16px;
  width: 300px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

.popup-card h3 {
  margin-bottom: 10px;
}

.popup-btn {
  width: 100%;
  padding: 12px;
  background: black;
  color: white;
  border: none;
  margin-top: 10px;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="page-wrapper">

  <div class="logo-wrapper">
    <img src="Norton_Secondary_Lockup_Horizontal.svg" class="company-logo">
  </div>

  <div class="card">
    <h2>Decrypt Leads</h2>
    <div class="section-underline"></div>

<input type="file" id="fileInput" accept=".enc,.json">
<input type="password" id="password" placeholder="Enter Password">

<button class="btn" onclick="decryptFile()">Decrypt & Download CSV</button>

  </div>

</div>

<!-- Popup -->

<div id="popup" class="popup-overlay">
  <div class="popup-card">
    <h3 id="popupTitle"></h3>
    <p id="popupMsg"></p>
    <button class="popup-btn" onclick="closePopup()">OK</button>
  </div>
</div>

<script>
function showPopup(title, msg) {
  document.getElementById("popupTitle").textContent = title;
  document.getElementById("popupMsg").textContent = msg;
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function decryptWithPBKDF2(encrypted, password, saltHex, ivHex) {
  const salt = CryptoJS.enc.Hex.parse(saltHex);
  const iv = CryptoJS.enc.Hex.parse(ivHex);

  const key = CryptoJS.PBKDF2(password, salt, {
    keySize: 256 / 32,
    iterations: 100000
  });

  const decrypted = CryptoJS.AES.decrypt(encrypted, key, { iv: iv });

  return decrypted.toString(CryptoJS.enc.Utf8);
}

function decryptFile() {
  const file = document.getElementById("fileInput").files[0];
  const password = document.getElementById("password").value;

  if (!file || !password) {
    showPopup("Error", "Please select file and enter password");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);

      const csv = decryptWithPBKDF2(
        parsed.data,
        password,
        parsed.salt,
        parsed.iv
      );

      if (!csv) {
        showPopup("Error", "Wrong password or invalid file");
        return;
      }

      const blob = new Blob(["\uFEFF" + csv], {
        type: "text/csv;charset=utf-8;"
      });
      const link = document.createElement("a");

      link.href = URL.createObjectURL(blob);
      link.download = "norton_leads.csv";

      link.click();

      showPopup("Success", "File decrypted successfully");

    } catch (err) {
      console.error(err);
      showPopup("Error", "Wrong password or invalid file");
    }
  };

  reader.readAsText(file);
}
</script>

</body>
</html>
