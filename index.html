<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Norton Enquiry Form</title>
<link rel="icon" type="image/svg+xml" href="Norton_Stamp_Roundel_RGB.svg">
<link rel="stylesheet" href="styles.css">
</head>

<body>
<script src="crypto-js.min.js"></script>
<div class="page-wrapper">

<div class="logo-wrapper">
  <img
    src="Norton_Secondary_Lockup_Horizontal.svg"
    alt="Norton Logo"
    class="company-logo"
  />
</div>
<div class="card">

   <div class="card-flip" id="cardFlip">
      <div class="card-face card-front">
        <div class="card-header">
          <div class="section-header">
            <h2 data-i18n="leadDetails">Details</h2>
            <div class="section-underline"></div>
          </div>
          <div class="status-row">
            <span id="dot" class="dot"></span>
            <span id="netText"></span>
            <div class="lang-switch">
              <select id="langSelect">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="it">Italiano</option>
              </select>
            </div>
            <div class="stats-toggle" id="statsToggle" data-i18n-title="viewStats" title="View Stats">
              <svg viewBox="0 0 24 24">
                <path d="M4 20V10"/>
                <path d="M10 20V4"/>
                <path d="M16 20V14"/>
                <path d="M22 20V8"/>
              </svg>
              <span class="stats-label" data-i18n="statsLabel">Stats</span>
            </div>
          </div>
          
        </div>
        

        <form id="leadForm" method="POST" novalidate>

          <input type="hidden" name="Lead_Source_Detail__c" value="NORTON_WEB_TO_LEAD_CAPTURE_OFFLINE">   
          <input type="hidden" name="Language__c" id="sfLanguage"> 

          <div class="form-row">
            <div>
              <label data-i18n="firstName">First Name</label>
              <input name="first_name" type="text" maxlength="40">
            </div>

            <div>
              <label class="required" data-i18n="lastName">Last Name</label>
              <input name="last_name" type="text" maxlength="80" required >
            </div>
          </div>

          <label class="required" data-i18n="email">Email</label>
          <input name="email" type="text" required inputmode="email">

          <div class="form-row">
            <div>
              <label data-i18n="phone">Phone</label>
              <input name="phone" type="tel" inputmode="tel" autocomplete="tel">
            </div>

            <div>
              <label data-i18n="postalCode">Postal Code</label>
              <input
                name="zip"
                type="text"
                maxlength="10"
                inputmode="text"
                pattern="[A-Za-z0-9\s\-]{3,10}"
                data-i18n-placeholder="postalHint"
              >
            </div>
          </div>
          
          <div class="form-row">
            <div>
              <label data-i18n="enquiryModel">Enquiry Model</label>
              <select name="Web_To_Lead_Enquiry_Model_Id__c" >
                <option value="" data-i18n="selectProduct">-- Select Product --</option>
              </select>
            </div>

            <div>
              <label data-i18n="enquiryType">Enquiry Type</label>
              <select name="Enquiry_Type__c">
                <option value="" data-i18n="selectEnquiryType">-- Select Enquiry Type --</option>
                <option value="Enquiry" data-i18n="enquiry">Enquiry</option>
                <option value="Waitlist" data-i18n="waitlist">Waitlist</option>
              </select>
            </div>
          </div>
          
          <div class="terms-section" style="margin:18px 0; border-top:1px solid #e5e7eb;">
            <label class="consent-item-terms">
              <input
                type="checkbox"
                id="termsAccepted"
                required
              >
              <span>
                <span data-i18n="termsBefore"></span>
                <a
                  href="#"
                  id="termsLink"
                  target="_blank"
                  rel="noopener noreferrer"
                  data-i18n="termsLinkText"
                ></a>
                <span data-i18n="termsAfter"></span>
              </span>
            </label>
          </div>
          <div class="consent-section">
            <div class="consent-title" data-i18n="commPref">Communication Preferences</div>
            <div class="consent-title" data-i18n="commPref2">Communication Preferences</div>
            <div class="consent-grid">
              <label class="consent-item"><input type="checkbox" name="Meta_Emai_Consent__c" value="true"><span data-i18n="email">Email</span></label>
              <label class="consent-item"><input type="checkbox" name="Meta_Phone_Consent__c" value="true"><span data-i18n="phone">Phone</span></label>
              <label class="consent-item"><input type="checkbox" name="Meta_SMS_Consent__c" value="true"> SMS</label>
              <label class="consent-item"><input type="checkbox" name="Meta_WhatsApp_Consent__c" value="true"> WhatsApp</label>
              <label class="consent-item"><input type="checkbox" name="Meta_RCS_Consent__c" value="true"> RCS</label>
            </div>
          </div>
          <div class="privacy-note">
            <span data-i18n="privacyBefore"></span>
            <a
              href="#"
              id="privacyLink"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="privacyLinkText"
            ></a>
          </div>
          <div class="form-footer">
            <button class="btn"  data-i18n="submit">Submit Lead</button>
          </div>
          
          <!-- <div style="margin:14px 0; border-top:1px solid #e5e7eb;"></div> -->
        </form>
      </div>
      <div class="card-face card-back">

      <h3 style="margin-top:10px;" data-i18n="leadSummary">Lead Summary</h3>

      <div class="stats-grid">

        <div class="stat">
          <span id="totalCount">0</span>
          <label data-i18n="total">Total</label>
        </div>

        <div class="stat">
          <span id="syncedCount">0</span>
          <label data-i18n="synced">Synced</label>
        </div>

        <div class="stat">
          <span id="pendingCount">0</span>
          <label data-i18n="pendingLabel">Pending</label>
        </div>

        <div class="stat">
          <span id="onlineCount">0</span>
          <label data-i18n="capturedOnline">Captured Online</label>
        </div>

        <div class="stat">
          <span id="offlineCount">0</span>
          <label data-i18n="capturedOffline">Captured Offline</label>
        </div>

      </div>

      <div style="margin-top: 20px;">
        <button onclick="openExportModal()" class="action-btn" data-i18n="exportLeads">Export Leads</button>
        <button onclick="openDeleteModal()" class="action-btn danger" data-i18n="deleteAllLeads">Delete All Leads</button>
      </div>

      <button id="backBtn" class="btn" style="margin-top:20px;" data-i18n="flipBtn">
        FLIP
      </button>
      <div class="delete-warning" data-i18n="deleteWarning"></div>


    </div>
   </div>
  

  

  <div id="pendingBar" class="pending-bar">
    <span id="pendingText"></span>
    <svg id="syncBtn" class="sync-icon" viewBox="0 0 24 24">
      <path d="M3 12a9 9 0 0 1 15.5-6.36"/>
      <polyline points="18 3 18 6 15 6"/>
      <path d="M21 12a9 9 0 0 1-15.5 6.36"/>
      <polyline points="6 21 6 18 9 18"/>
    </svg>
  </div>

</div>

<iframe name="hidden_sf_target" style="display:none;"></iframe>
</div>

<div id="successPopup" class="popup-overlay">
  <div class="popup-card">
    <h3 id="popupTitle"></h3>

    <p id="successMsg"></p>

    <button onclick="closePopup()" class="popup-btn" data-i18n="ok">
      OK
    </button>
  </div>
</div>
<script src="app.js"></script>

<div id="exportModal" class="modal">
  <div class="modal-card">

    <h3 class="modal-title" data-i18n="exportLeads">Export Leads</h3>

    <input type="password" id="exportPassword" data-i18n-placeholder="enterPassword" class="modal-input"/>
    <input type="password" id="confirmPassword" data-i18n-placeholder="confirmPassword" class="modal-input"/>

    <div class="modal-actions">
      <button type="button" class="modal-btn secondary" onclick="closeExportModal()" data-i18n="cancel">Cancel</button>
      <button type="button" class="modal-btn primary" onclick="exportLeads()" data-i18n="export">Export</button>
    </div>

  </div>
</div>
<div id="deleteModal" class="modal">
  <div class="modal-card">

    <h3 class="modal-title" data-i18n="deleteConfirmTitle">Type DELETE to confirm</h3>

    <input type="text" id="deleteConfirmText" data-i18n-placeholder="typeDelete"  class="modal-input"/>

    <div class="modal-actions">
      <button type="button" class="modal-btn secondary" onclick="closeDeleteModal()" data-i18n="cancel">Cancel</button>
      <button type="button" class="modal-btn danger" onclick="clearAllLeads()" data-i18n="delete">Delete</button>
    </div>

  </div>
</div>
</body>
</html>
